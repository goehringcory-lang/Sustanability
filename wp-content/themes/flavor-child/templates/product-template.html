<!-- ═══════════════════════════════════════════════════════════════════
     PRODUCT TEMPLATE
     Copy this template when adding a new product.
     Two parts: (1) the card for the grid, (2) the JS data entry.
     ═══════════════════════════════════════════════════════════════════ -->


<!-- ── PART 1: Product Card ──────────────────────────────────────────
     Paste this inside the .product-grid div for the right category.
     Update: product name, image, category, description, price, tag.
     ─────────────────────────────────────────────────────────────────── -->

<div class="product-card" onclick="showProduct('PRODUCT NAME')">
    <div class="card-img">
        <!-- Replace with real image: -->
        <!-- <img src="wp-content/themes/flavor-child/images/product-slug.jpg" alt="PRODUCT NAME" style="width:100%;height:100%;object-fit:cover;"> -->
        <span class="img-label">Product Photo</span>
    </div>
    <div class="card-body">
        <span class="card-category">CATEGORY</span>
        <h3>PRODUCT NAME</h3>
        <p class="card-desc">One-sentence description of what makes this product worth recommending.</p>
        <div class="card-meta">
            <span class="card-price">~$XX</span>
            <span class="card-tag">KEY FEATURE</span>
        </div>
    </div>
</div>
